<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sai Teja - UX/UI Designer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
:root{--bg:#07070d;--bg2:#0e0e18;--bg3:#13131f;--s:rgba(255,255,255,0.035);--s2:rgba(255,255,255,0.06);--b:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.12);--t:#eeeef5;--t2:rgba(238,238,245,0.6);--t3:rgba(238,238,245,0.35);--a:#6b9fff;--ag:rgba(107,159,255,0.25);--a2:#a78bfa;--g:#34d399}
body.light{--bg:#fafafa;--bg2:#f2f2f7;--bg3:#e8e8f0;--s:rgba(0,0,0,0.03);--s2:rgba(0,0,0,0.06);--b:rgba(0,0,0,0.08);--b2:rgba(0,0,0,0.14);--t:#0d0d14;--t2:rgba(13,13,20,0.55);--t3:rgba(13,13,20,0.3);--a:#2563eb;--ag:rgba(37,99,235,0.15);--a2:#7c3aed;--g:#059669}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t);line-height:1.6;overflow-x:hidden;transition:background .35s,color .35s}
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;background:rgba(7,7,13,0.85);backdrop-filter:blur(24px);border-bottom:1px solid var(--b);transition:background .35s}
body.light nav{background:rgba(250,250,250,0.9)}
.nl{font-size:14px;font-weight:700;color:var(--t);text-decoration:none;display:flex;align-items:center;gap:10px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--a);box-shadow:0 0 8px var(--a);animation:pd 2.5s ease-in-out infinite}
@keyframes pd{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.nr{display:flex;align-items:center;gap:4px}
.nr a{font-size:13px;font-weight:500;color:var(--t2);text-decoration:none;padding:6px 12px;border-radius:8px;transition:all .2s}
.nr a:hover{color:var(--t);background:var(--s2)}
.tb{width:34px;height:34px;border-radius:9px;border:1px solid var(--b2);background:var(--s);color:var(--t2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-left:6px}
.tb:hover{background:var(--s2);color:var(--t)}
.hero{min-height:100vh;max-width:1200px;margin:0 auto;padding:120px 40px 80px;display:grid;grid-template-columns:1fr 400px;gap:80px;align-items:center;position:relative}
.hero::before{content:'';position:absolute;top:20%;left:-10%;width:600px;height:600px;background:radial-gradient(circle,rgba(107,159,255,0.06) 0%,transparent 70%);pointer-events:none}
.avail{display:inline-flex;align-items:center;gap:8px;padding:5px 14px 5px 8px;background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.2);border-radius:100px;font-size:12px;font-weight:600;color:var(--g);margin-bottom:32px}
.avail span{width:6px;height:6px;border-radius:50%;background:var(--g);animation:pd 2s infinite}
.eyebrow{font-size:13px;font-weight:600;color:var(--a);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px}
.hname{font-size:clamp(44px,5.5vw,76px);font-weight:900;letter-spacing:-3px;line-height:1.0;margin-bottom:20px;color:var(--t)}
.hname .aw{background:linear-gradient(135deg,var(--a) 0%,var(--a2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hrole{font-size:18px;font-weight:400;color:var(--t2);margin-bottom:28px;min-height:28px}
#rt{color:var(--a);font-weight:600}
#rt::after{content:'|';animation:blink 1s infinite;margin-left:1px}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
.hbio{font-size:15px;color:var(--t2);line-height:1.85;max-width:500px;margin-bottom:44px}
.hctas{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:52px}
.cp{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;border-radius:12px;background:var(--a);color:#fff;font-size:14px;font-weight:600;text-decoration:none;transition:all .25s;box-shadow:0 0 0 0 var(--ag)}
.cp:hover{transform:translateY(-2px);box-shadow:0 8px 32px var(--ag)}
.cg{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;border-radius:12px;background:transparent;color:var(--t);font-size:14px;font-weight:500;text-decoration:none;border:1px solid var(--b2);transition:all .25s}
.cg:hover{background:var(--s2);transform:translateY(-2px)}
.hmeta{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.mi{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t2);text-decoration:none;transition:color .2s}
.mi:hover{color:var(--t)}
.mic{width:32px;height:32px;border-radius:8px;background:var(--s2);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--t2);transition:all .2s}
.mi:hover .mic{background:var(--a);color:#fff;border-color:var(--a)}
.msep{width:1px;height:20px;background:var(--b2)}
.hr2{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:16px}
.pf{position:relative;width:340px;height:400px}
.pf::before{content:'';position:absolute;inset:-1px;border-radius:28px;background:linear-gradient(145deg,var(--a),var(--a2),transparent);z-index:0;opacity:.7}
.pi{position:relative;z-index:1;width:100%;height:100%;border-radius:27px;overflow:hidden;background:var(--bg3)}
.pi img{width:100%;height:100%;object-fit:cover}
.pb{position:absolute;bottom:-12px;left:-16px;background:var(--bg2);border:1px solid var(--b2);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:10px;z-index:2}
.pb-t{font-size:11px;font-weight:600;color:var(--t);line-height:1.4}
.pb-s{font-size:10px;color:var(--t2);font-weight:400}
.sr{display:flex;gap:10px;width:100%}
.sp{flex:1;background:var(--s2);border:1px solid var(--b);border-radius:14px;padding:14px 12px;text-align:center}
.sn{display:block;font-size:22px;font-weight:800;color:var(--a);letter-spacing:-1px}
.sl{display:block;font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.mq{overflow:hidden;border-top:1px solid var(--b);border-bottom:1px solid var(--b);padding:18px 0;background:var(--bg2)}
.mt{display:flex;gap:32px;animation:mq 25s linear infinite;width:max-content}
.mq:hover .mt{animation-play-state:paused}
@keyframes mq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.mi2{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--t2);white-space:nowrap}
.mi2::before{content:'?';font-size:8px;color:var(--a)}
.sw{max-width:1200px;margin:0 auto;padding:96px 40px}
.se{font-size:11px;font-weight:700;color:var(--a);text-transform:uppercase;letter-spacing:2.5px;margin-bottom:10px}
.sh{font-size:clamp(28px,3.5vw,44px);font-weight:800;letter-spacing:-1.5px;color:var(--t);margin-bottom:8px}
.ss{font-size:15px;color:var(--t2);margin-bottom:56px;max-width:480px}
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.pc{background:var(--s);border:1px solid var(--b);border-radius:20px;overflow:hidden;text-decoration:none;display:flex;flex-direction:column;transition:all .3s cubic-bezier(.4,0,.2,1);position:relative}
.pc:hover{transform:translateY(-8px);box-shadow:0 24px 64px rgba(0,0,0,.4);border-color:rgba(107,159,255,.25)}
.pci{height:210px;overflow:hidden;background:linear-gradient(135deg,rgba(107,159,255,.1),rgba(167,139,250,.1))}
.pci img{width:100%;height:100%;object-fit:cover;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.pc:hover .pci img{transform:scale(1.06)}
.pcb{padding:22px;flex:1;display:flex;flex-direction:column}
.pcc{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--a);background:rgba(107,159,255,.1);border:1px solid rgba(107,159,255,.2);padding:3px 10px;border-radius:100px}
.pct{font-size:19px;font-weight:700;color:var(--t);margin-bottom:8px;letter-spacing:-.4px}
.pcd{font-size:13px;color:var(--t2);line-height:1.75;flex:1}

.pcl{font-size:12px;font-weight:700;color:var(--a)}
.pca{font-size:14px;color:var(--a);transition:transform .2s}
.pc:hover .pca{transform:translateX(5px)}
.prg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:56px}
.ps{background:var(--s);border:1px solid var(--b);border-radius:16px;padding:24px 20px;transition:all .25s}
.ps:hover{background:var(--s2);border-color:var(--b2)}
.psn{font-size:11px;font-weight:700;color:var(--a);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.pst{font-size:15px;font-weight:700;color:var(--t);margin-bottom:8px}
.psd{font-size:12px;color:var(--t2);line-height:1.7}
.aw2{background:var(--bg2);border-top:1px solid var(--b);border-bottom:1px solid var(--b)}
.ai{max-width:1200px;margin:0 auto;padding:96px 40px;display:grid;grid-template-columns:1fr 1fr;gap:96px;align-items:start}
.al h2{font-size:clamp(28px,3.5vw,44px);font-weight:800;letter-spacing:-1.5px;color:var(--t);margin-bottom:24px;line-height:1.15}
.al p{font-size:15px;color:var(--t2);line-height:1.9;margin-bottom:18px}
.ac{display:flex;flex-direction:column;gap:12px}
.acard{background:var(--s);border:1px solid var(--b);border-radius:16px;padding:20px;display:flex;gap:16px;align-items:flex-start;transition:all .25s}
.acard:hover{background:var(--s2);border-color:var(--b2);transform:translateX(4px)}
.ai2{width:40px;height:40px;border-radius:10px;background:rgba(107,159,255,.1);border:1px solid rgba(107,159,255,.15);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.at{font-size:14px;font-weight:700;color:var(--t);margin-bottom:4px}
.ad{font-size:13px;color:var(--t2);line-height:1.65}
.cw{max-width:1200px;margin:0 auto;padding:96px 40px;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.cl h2{font-size:clamp(28px,3.5vw,44px);font-weight:800;letter-spacing:-1.5px;color:var(--t);margin-bottom:16px;line-height:1.15}
.cl p{font-size:15px;color:var(--t2);line-height:1.8;margin-bottom:32px}
.cbs{display:flex;gap:10px;flex-wrap:wrap}
.cr{display:flex;flex-direction:column;gap:10px}
.cc{background:var(--s);border:1px solid var(--b);border-radius:14px;padding:18px 20px;display:flex;align-items:center;gap:14px;text-decoration:none;transition:all .25s}
.cc:hover{background:var(--s2);border-color:var(--b2);transform:translateX(4px)}
.cci{width:38px;height:38px;border-radius:10px;background:rgba(107,159,255,.1);border:1px solid rgba(107,159,255,.15);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--a);flex-shrink:0}
.ccl{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.8px}
.ccv{font-size:14px;font-weight:500;color:var(--t)}
footer{border-top:1px solid var(--b);padding:24px 40px;display:flex;align-items:center;justify-content:space-between}
.fc{font-size:12px;color:var(--t3)}
.fl{display:flex;gap:20px}
.fl a{font-size:12px;color:var(--t3);text-decoration:none;transition:color .2s}
.fl a:hover{color:var(--t2)}

@media(max-width:600px){.hname{font-size:40px;letter-spacing:-2px}.pg{grid-template-columns:1fr}.prg{grid-template-columns:1fr}.sr{justify-content:center}.nr a:not(.tb){display:none}footer{flex-direction:column;gap:12px;text-align:center}}
